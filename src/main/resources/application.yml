spring:
  application:
    name: chessiq

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chessiq}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    io.chessiq: DEBUG
    org.springframework.security: INFO

chessiq:
  chess-com:
    base-url: "https://api.chess.com/pub"
    user-agent: "ChessIQ/1.0 contact@chessiq.io"
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-production}
    expiration-ms: 86400000